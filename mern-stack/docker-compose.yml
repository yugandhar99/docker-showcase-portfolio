services:
  frontend:
    build:
      context: frontend
      target: dev
    env_file: ./frontend/.env.dev.sample
    ports:
      - "5000:5000"
    stdin_open: true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - frontend-backend
    depends_on:
      - backend

  backend:
    build:
      context: backend
      target: dev
    env_file: ./backend/.env.dev.sample
    ports:
      - "5001:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - frontend-backend
      - backend-db
    depends_on:
      - db

  db:
    image: mongo:6.0
    expose:
      - "27017"
    volumes:
      - db-data:/data/db
    networks:
      - backend-db

networks:
  frontend-backend:
  backend-db:

volumes:
  db-data:
