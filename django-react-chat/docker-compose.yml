services:
  client:
    build:
      context: client
      target: dev
    env_file: ./client/.env.dev.sample
    ports:
      - "5000:5000"
    stdin_open: true
    volumes:
      - ./client:/app
      - /app/node_modules
    networks:
      - client-server
    depends_on:
      - server

  server:
    build:
      context: server
      target: dev
    command: python manage.py runserver 0.0.0.0:8000
    env_file: ./server/.env.dev.sample
    ports:
      - "8000:8000"
    volumes:
      - ./server:/app
    networks:
      - client-server
      - server-db
    depends_on:
      - db

  db:
    image: postgres:14-alpine
    env_file: ./db/.env.dev.sample
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - server-db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dr_chat -d dr_chat_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  client-server:
  server-db:

volumes:
  db-data:
